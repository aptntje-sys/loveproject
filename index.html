<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حكايتنا ❤️</title>
    <style>
        :root { --primary: #ff4d6d; --bg: #1a0005; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        .container { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); padding: 40px 20px; border-radius: 30px; text-align: center; width: 85%; max-width: 400px; z-index: 10; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; }
        h1 { color: var(--primary); font-size: 28px; margin-bottom: 10px; text-shadow: 0 0 15px var(--primary); }
        .timer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .time-card { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; border-bottom: 3px solid var(--primary); }
        .time-card span { display: block; font-size: 22px; font-weight: bold; }
        .time-card label { font-size: 12px; opacity: 0.7; }
        .date-badge { background: var(--primary); padding: 5px 15px; border-radius: 20px; font-size: 14px; display: inline-block; margin-top: 10px; }
        .heart-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        @keyframes float { 0% { transform: translateY(110vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; } }
        .floating-heart { position: absolute; color: var(--primary); font-size: 20px; animation: float 4s linear infinite; }
    </style>
</head>
<body>
    <div class="heart-bg" id="bg"></div>
    <div class="container">
        <div style="font-size: 50px;">❤️</div>
        <h1>كل ثانية وأنتي في قلبي</h1>
        <p style="opacity: 0.8;">بدايتنا كانت وما زالت أجمل حكاية</p>
        
        <div class="timer-grid">
            <div class="time-card"><span id="days">0</span><label>يوم</label></div>
            <div class="time-card"><span id="hours">0</span><label>ساعة</label></div>
            <div class="time-card"><span id="mins">0</span><label>دقيقة</label></div>
            <div class="time-card"><span id="secs">0</span><label>ثانية</label></div>
        </div>

        <div class="date-badge">14-04-2023</div>
    </div>

    <script>
        function update() {
            const start = new Date("2023-04-14T00:00:00");
            const now = new Date();
            const diff = now - start;
            document.getElementById("days").innerText = Math.floor(diff / 86400000);
            document.getElementById("hours").innerText = Math.floor((diff / 3600000) % 24);
            document.getElementById("mins").innerText = Math.floor((diff / 60000) % 60);
            document.getElementById("secs").innerText = Math.floor((diff / 1000) % 60);
        }
        setInterval(update, 1000);
        update();

        function createHeart() {
            const h = document.createElement("div");
            h.innerHTML = "❤️";
            h.className = "floating-heart";
            h.style.left = Math.random() * 100 + "vw";
            h.style.animationDuration = (Math.random() * 2 + 3) + "s";
            h.style.opacity = Math.random();
            document.getElementById("bg").appendChild(h);
            setTimeout(() => h.remove(), 5000);
        }
        setInterval(createHeart, 300);
    </script>
</body>
</html>
