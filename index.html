<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى ست البنات ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #ff4d6d; 
            --soft-pink: #ffdae0; 
            --gold: #ffd700;
            --glass: rgba(255, 255, 255, 0.25); 
        }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        
        body { 
            margin: 0; 
            background: linear-gradient(135deg, #4b1248 0%, #f06292 100%); 
            color: white; 
            overflow-x: hidden; 
            text-align: center; 
            min-height: 100vh;
        }

        /* فيديو الخلفية m7 */
        #video-bg { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: cover; z-index: -1; opacity: 0.6; display: none; 
        }

        .bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.6; animation: twinkle var(--d) infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        
        .bg-heart { position: absolute; color: white; opacity: 0.8; animation: floatUp 5s infinite linear; }
        @keyframes floatUp { from { transform: translateY(110vh) rotate(0deg); } to { transform: translateY(-10vh) rotate(360deg); } }

        section { min-height: 100vh; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; z-index: 2; }
        .active { display: flex; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .glass-box { 
            background: var(--glass); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(255,255,255,0.4); 
            border-radius: 40px; padding: 35px 20px; 
            width: 95%; max-width: 420px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
        }

        .crystal-heart { 
            font-size: 80px; color: white; 
            filter: drop-shadow(0 0 15px var(--primary)); 
            animation: heartPulse 1.2s infinite; 
            margin-bottom: 20px; display: inline-block; 
        }
        @keyframes heartPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }

        input { 
            width: 90%; padding: 15px; margin: 20px 0; border-radius: 20px; 
            border: none; background: white; 
            color: #4b1248; text-align: center; font-size: 18px; outline: none; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        button { 
            background: var(--primary); 
            color: white; border: none; padding: 14px 40px; 
            border-radius: 30px; font-weight: 800; cursor: pointer; 
            transition: 0.3s; margin: 10px 5px; 
            box-shadow: 0 5px 15px rgba(255,77,109,0.3);
        }

        /* مشغل الموسيقى البيضاوي */
        .music-oval { 
            background: white; color: var(--primary); border-radius: 50px; 
            padding: 12px 30px; margin: 20px 0; display: inline-flex; 
            align-items: center; gap: 12px; cursor: pointer; 
            font-weight: 800; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .timer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; margin: 20px 0; }
        .time-card { background: rgba(255,255,255,0.3); padding: 15px; border-radius: 25px; }
        .time-card span { display: block; font-size: 28px; color: white; font-weight: 900; }

        /* تعديل مسار الصور */
        .photo-list { width: 100%; max-width: 450px; }
        .photo-item { background: white; border-radius: 30px; padding: 10px; margin-bottom: 35px; box-shadow: 0 10px 20px rgba(0,0,0,0.15); }
        .photo-item img { width: 100%; border-radius: 25px; display: block; }
        .photo-item p { color: #4b1248; font-weight: 800; margin: 10px 0; }

        #typewriter { line-height: 1.8; font-size: 19px; color: #fff; text-align: justify; font-weight: 700; }
        
        #backBtn, .music-mini { position: fixed; z-index: 100; background: white; color: var(--primary); width: 45px; height: 45px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #backBtn { top: 20px; right: 20px; }
        .music-mini { top: 20px; left: 20px; }

        .falling-flower { position: fixed; font-size: 30px; z-index: 999; pointer-events: none; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

    <div class="bg-container" id="bg"></div>
    <div id="backBtn" onclick="goBack()">➜</div>
    <div id="mBtn" class="music-mini" onclick="toggleM()">🎵</div>

    <video id="video-bg" loop muted playsinline>
        <source src="m7">
    </video>

    <audio id="audio" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg"></audio>

    <section id="p1" class="active">
        <div class="glass-box">
            <div class="crystal-heart">❤️</div>
            <h2 id="welcome-text" style="color: white; min-height: 35px; font-weight: 800;"></h2>
            <input type="text" id="pw" placeholder="اكتبي الباسورد يا دكتورة..">
            <button onclick="checkPw()">دخول ❤️</button>
        </div>
    </section>

    <section id="p2">
        <div class="glass-box">
            <h3 style="font-weight: 800; font-size: 24px;">حكايتنا بدأت من.. ❤️</h3>
            <div class="timer-grid">
                <div class="time-card"><span id="dd">0</span><label>يوم</label></div>
                <div class="time-card"><span id="hh">0</span><label>ساعة</label></div>
                <div class="time-card"><span id="mm">0</span><label>دقيقة</label></div>
                <div class="time-card"><span id="ss">0</span><label>ثانية</label></div>
            </div>
            <div class="music-oval" onclick="toggleM()">
                <span>🎵 مشغل الموسيقى</span>
            </div>
            <button onclick="showPage('p3')" style="margin-top: 15px; background: white; color: var(--primary);">صورنا 📸</button>
        </div>
    </section>

    <section id="p3" style="justify-content: flex-start; padding-top: 60px;">
        <h2 style="margin-bottom: 30px; text-shadow: 0 2px 10px rgba(0,0,0,0.2);">أجمل لحظاتنا ❤️</h2>
        <div class="photo-list">
            <div class="photo-item"><img src="m1"><p>أول ضحكة صافية ❤️</p></div>
            <div class="photo-item"><img src="m2"><p>البدايات اللي منسيتهاش ❤️</p></div>
            <div class="photo-item"><img src="m3"><p>نور عيني ❤️</p></div>
            <div class="photo-item"><img src="m4"><p>كل تفصيلة معاكي حياة ❤️</p></div>
            <div class="photo-item"><img src="m5"><p>سندي في الدنيا ❤️</p></div>
        </div>
        <button onclick="startFinalPage()">المفاجأة 🎁</button>
    </section>

    <section id="p4">
        <div class="glass-box">
            <div id="typewriter"></div>
        </div>
        <div class="glass-box" style="margin-top:20px; padding:20px; background: white; color: #4b1248;">
            <h4 style="margin:0; font-weight: 800;">باقي على يومنا الكبير إن شاء الله 💍</h4>
            <div id="engagement-timer" style="font-size: 22px; margin-top:10px; font-weight:900; color: var(--primary);"></div>
        </div>
        <button onclick="giveFlower()" style="background: var(--gold); color: #000; margin-top: 20px;">خدي وردة 🌸</button>
    </section>

    <script>
        const bg = document.getElementById('bg');
        let currentStep = 1;

        function createElements() {
            for(let i=0; i<45; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                s.style.width = s.style.height = Math.random()*3+'px';
                s.style.left = Math.random()*100+'vw';
                s.style.top = Math.random()*100+'vh';
                s.style.setProperty('--d', (Math.random()*3+2)+'s');
                bg.appendChild(s);
            }
            setInterval(() => {
                const h = document.createElement('div');
                h.innerHTML = '💕';
                h.className = 'bg-heart';
                h.style.left = Math.random()*100+'vw';
                h.style.fontSize = (Math.random()*15 + 15)+'px';
                bg.appendChild(h);
                setTimeout(() => h.remove(), 5000);
            }, 300);
        }
        createElements();

        function typeWriter(id, text, speed, callback) {
            let i = 0; const el = document.getElementById(id); el.innerHTML = "";
            function type() { if (i < text.length) { el.innerHTML += text.charAt(i); i++; setTimeout(type, speed); } else if (callback) callback(); }
            type();
        }

        window.onload = () => { typeWriter("welcome-text", "نورتي قلبي يا دكتورة 😉", 40); };

        function checkPw() {
            if(document.getElementById('pw').value === 'mab14') {
                showPage('p2');
                document.getElementById('audio').play();
                document.getElementById('mBtn').style.display = 'flex';
                document.getElementById('backBtn').style.display = 'flex';
                setInterval(updateTimers, 1000);
            } else { alert("الباسورد غلط يا دكتورة! 😉"); }
        }

        function showPage(id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            const v = document.getElementById('video-bg');
            if(id === 'p2') { v.style.display = 'block'; v.play(); } else { v.style.display = 'none'; v.pause(); }
            window.scrollTo(0,0);
            currentStep = parseInt(id.replace('p',''));
        }

        function goBack() {
            if(currentStep > 1) showPage('p' + (currentStep - 1));
            if(currentStep === 1) document.getElementById('backBtn').style.display = 'none';
        }

        function updateTimers() {
            const start = new Date("2023-04-14T00:00:00");
            const now = new Date();
            const diff1 = now - start;
            document.getElementById("dd").innerText = Math.floor(diff1 / 86400000);
            document.getElementById("hh").innerText = Math.floor((diff1 / 3600000) % 24);
            document.getElementById("mm").innerText = Math.floor((diff1 / 60000) % 60);
            document.getElementById("ss").innerText = Math.floor((diff1 / 1000) % 60);

            const target = new Date("2027-10-14T00:00:00");
            const diff2 = target - now;
            if (diff2 > 0) {
                const totalMonths = (target.getFullYear() - now.getFullYear()) * 12 + (target.getMonth() - now.getMonth());
                document.getElementById("engagement-timer").innerText = `${Math.floor(totalMonths/12)} سنة و ${totalMonths%12} شهر`;
            }
        }

        const msg = "يا أغلى من روحي ☺️ أنا قاعد دلوقتي بفكر فيكي ولقيت نفسي عايز أكتبلك كلام كتير رغم إنك عارفة إن الكلام ساعات بيخوني وما بيعرفش يوصف اللي جوايا صح 👀 بس بجد أنا كل يوم بكتشف إن وجودك في حياتي ده أكبر نعمة ربنا رزقني بيها.. أنتي مش بس حبيبتي، أنتي نصيبي الحلو من الدنيا والضحكة اللي بتطلع من قلبي بجد مهما كنت شايل هموم 🫂 معاكي بحس إن الدنيا لسه بخير وبحس إن عندي طاقة أهد جبال عشان بس أشوفك مبسوطة ومرتاحة.. هفضل دايماً جنبك وفي ضهرك ومعاكي في المرة قبل الحلوة عشان أنتي تستاهلي كل حاجة حلوة يا حلوة 😉🌍";

        function startFinalPage() { showPage('p4'); setTimeout(() => { typeWriter("typewriter", msg, 40); }, 500); }

        function giveFlower() {
            const flowers = ['🌸','🌹','🌷','🌺','🌻','🌼'];
            for(let i=0; i<30; i++) {
                const f = document.createElement('div');
                f.className = 'falling-flower';
                f.innerHTML = flowers[Math.floor(Math.random()*flowers.length)];
                f.style.left = Math.random()*100+'vw';
                f.style.top = '-50px';
                f.style.animationDuration = (Math.random()*2+2)+'s';
                document.body.appendChild(f);
                setTimeout(() => f.remove(), 4000);
            }
        }

        function toggleM() {
            const a = document.getElementById('audio');
            if (a.paused) a.play(); else a.pause();
        }
    </script>
</body>
</html>
