<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى ست البنات ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main: #4a0404; --gold: #c5a059; --glass: rgba(255, 255, 255, 0.08); }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { margin: 0; background: #1a0101; color: white; overflow-x: hidden; text-align: center; }
        
        .bg-hearts { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .heart { position: absolute; color: var(--gold); opacity: 0.5; animation: floatUp 5s infinite linear; }
        @keyframes floatUp { from { transform: translateY(110vh); } to { transform: translateY(-10vh); } }

        section { min-height: 100vh; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; z-index: 2; }
        .active { display: flex; animation: fadeIn 0.6s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .glass-box { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 40px 20px; width: 95%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        input { width: 90%; padding: 15px; margin: 20px 0; border-radius: 15px; border: 1px solid var(--gold); background: rgba(0,0,0,0.4); color: white; font-size: 16px; outline: none; text-align: center; }
        button { background: var(--gold); color: #1a0101; border: none; padding: 12px 35px; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 15px; }

        .timer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin: 20px 0; }
        .time-card { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; border-bottom: 2px solid var(--gold); }
        .time-card span { display: block; font-size: 24px; color: var(--gold); font-weight: bold; }

        .photo-list { width: 100%; max-width: 450px; }
        .photo-item { background: var(--glass); border-radius: 20px; padding: 10px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.05); }
        .photo-item img { width: 100%; border-radius: 15px; display: block; }
        .photo-item p { font-size: 14px; margin-top: 12px; color: #eee; }

        .music-control { position: fixed; top: 15px; left: 15px; z-index: 100; background: var(--glass); padding: 8px 15px; border-radius: 30px; border: 1px solid var(--gold); display: none; font-size: 12px; cursor: pointer; }
        
        /* تأثير المؤشر (كتابة حرف حرف) */
        .typewriter-cursor::after { content: '|'; animation: blink 1s step-end infinite; color: var(--gold); }
        @keyframes blink { from, to { opacity: 1; } 50% { opacity: 0; } }
        
        #typewriter { line-height: 1.8; font-size: 17px; color: #fdfdfd; text-align: right; }
    </style>
</head>
<body>

    <div class="bg-hearts" id="hearts"></div>
    <div class="music-control" id="mBtn" onclick="toggleM()">🎵 تشغيل/إيقاف الموسيقى</div>
    
    <audio id="audio" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg"></audio>

    <section id="p1" class="active">
        <div class="glass-box">
            <h2 id="welcome-text" style="color: var(--gold); min-height: 40px;" class="typewriter-cursor"></h2>
            <input type="text" id="pw" placeholder="اكتبي الباسورد ي قمر😉">
            <button onclick="step2()">دخول ❤️</button>
        </div>
    </section>

    <section id="p2">
        <div class="glass-box">
            <h2 style="color: var(--gold);">حكايتنا بدأت من..</h2>
            <div class="timer-grid">
                <div class="time-card"><span id="dd">0</span><label>يوم</label></div>
                <div class="time-card"><span id="hh">0</span><label>ساعة</label></div>
                <div class="time-card"><span id="mm">0</span><label>دقيقة</label></div>
                <div class="time-card"><span id="ss">0</span><label>ثانية</label></div>
            </div>
            <div style="background: var(--gold); color: #000; padding: 5px 20px; border-radius: 20px; font-weight: bold; margin: 10px 0;">14-04-2023</div>
            <button onclick="step3()">شوفي الذكريات 📸</button>
        </div>
    </section>

    <section id="p3" style="justify-content: flex-start; padding-top: 40px;">
        <h2 style="color: var(--gold); margin-bottom: 30px;">ذكرياتنا الحلوة ❤️</h2>
        <div class="photo-list">
            <div class="photo-item"><img src="m1"><p>الصورة دي كانت حلوة، مش بتتشال من البال ❤️</p></div>
            <div class="photo-item"><img src="m2"><p>اللحظة دي كانت بداية لكل حاجة حلوة ❤️</p></div>
            <div class="photo-item"><img src="m3"><p>ضحكتك في الصورة دي سبب فرحتي ❤️</p></div>
            <div class="photo-item"><img src="m4"><p>كل تفصيلة هنا محفورة في قلبي ❤️</p></div>
            <div class="photo-item"><img src="m5"><p>أجمل ذكرى مع أغلى إنسانة ❤️</p></div>
        </div>
        <button onclick="step4()" style="margin: 40px 0;">شوفي المفاجأة 🎁</button>
    </section>

    <section id="p4">
        <p style="color: var(--gold); font-size: 18px; margin-bottom: 15px;">الرسالة دي ليكي يا ست البنات</p>
        <div class="glass-box" style="border: 2px dashed var(--gold); min-height: 200px;">
            <div id="typewriter" class="typewriter-cursor"></div>
        </div>
        <div style="font-size: 30px; margin-top: 20px;">❤️❤️❤️</div>
    </section>

    <script>
        // دالة إنشاء القلوب في الخلفية
        function createHearts() {
            const c = document.getElementById('hearts');
            for(let i=0; i<20; i++) {
                const h = document.createElement('div');
                h.innerHTML = '❤️'; h.className = 'heart';
                h.style.left = Math.random() * 100 + 'vw';
                h.style.animationDuration = (Math.random() * 3 + 4) + 's';
                c.appendChild(h);
            }
        }
        createHearts();

        // دالة تأثير الكتابة العامة
        function typeText(elementId, text, speed, callback) {
            let i = 0;
            function type() {
                if (i < text.length) {
                    document.getElementById(elementId).innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                } else if (callback) { callback(); }
            }
            document.getElementById(elementId).innerHTML = ""; // مسح النص قبل البدء
            type();
        }

        // أول ما الموقع يفتح، نبدأ نكتب العنوان
        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => {
                typeText("welcome-text", "نورتي قلبي يا دكتورة 😉", 80, () => {
                    // بعد ما يخلص كتابة، نشيل تأثير المؤشر من العنوان
                    document.getElementById("welcome-text").classList.remove("typewriter-cursor");
                });
            }, 1000); // تأخير ثانية واحدة في البداية
        });

        // رسالتك المؤثرة
        const finalMessageText = "يا أغلى من روحي ☺️ أنا قاعد دلوقتي بفكر فيكي ولقيت نفسي عايز أكتبلك كلام كتير رغم إنك عارفة إن الكلام ساعات بيخوني وما بيعرفش يوصف اللي جوايا صح 👀 بس بجد أنا كل يوم بكتشف إن وجودك في حياتي ده أكبر نعمة ربنا رزقني بيها.. أنتي مش بس حبيبتي، أنتي نصيبي الحلو من الدنيا والضحكة اللي بتطلع من قلبي بجد مهما كنت شايل هموم 🫂 عارفة؟ أنا بحب تفاصيلك الصغيرة اللي ممكن محدش ياخد باله منها، بحب طريقتك في الكلام (بس ميمنعش إنك عبيطة 😂)، وبحب إنك دايماً بتعرفي تطمنيني بمجرد كلمة منك.. معاكي بحس إن الدنيا لسه بخير وبحس إن عندي طاقة أهد جبال عشان بس أشوفك مبسوطة ومرتاحة.. أنتي السند والكتف اللي برمي عليه تعبي وببقى عارف إني هقوم أقوى بيكي. نفسي تعرفي إن مفيش حد في الدنيا ممكن ياخد مكانك ولا فيه حاجة تعوضني عنك، أنا عايش عشان اللحظة اللي نكون فيها سوا في بيتنا ونبني كل الأحلام اللي حلمنا بيها مع بعض.. هفضل دايماً جنبك وفي ضهرك ومعاكي في المرة قبل الحلوة عشان أنتي تستاهلي كل حاجة حلوة يا حلوة 😉🌍";

        function step2() {
            if(document.getElementById('pw').value === 'mab14') {
                show('p2');
                document.getElementById('audio').play();
                document.getElementById('mBtn').style.display = 'block';
                setInterval(updateT, 1000);
            } else { alert("الباسورد غلط يا قمر! 😉"); }
        }

        function step3() { show('p3'); }

        function step4() { 
            show('p4');
            // نبدأ نكتب الرسالة الأخيرة بعد ما الصفحة تفتح بشوية
            setTimeout(() => {
                typeText("typewriter", finalMessageText, 40, () => {
                    // بعد ما يخلص كتابة الرسالة الأخيرة، نشيل المؤشر
                    document.getElementById("typewriter").classList.remove("typewriter-cursor");
                });
            }, 500);
        }

        function show(id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        function toggleM() {
            const a = document.getElementById('audio');
            a.paused ? a.play() : a.pause();
        }

        function updateT() {
            const diff = new Date() - new Date("2023-04-14T00:00:00");
            document.getElementById("dd").innerText = Math.floor(diff / 86400000);
            document.getElementById("hh").innerText = Math.floor((diff / 3600000) % 24);
            document.getElementById("mm").innerText = Math.floor((diff / 60000) % 60);
            document.getElementById("ss").innerText = Math.floor((diff / 1000) % 60);
        }
    </script>
</body>
</html>
