<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى ست البنات ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #d4af37; 
            --glass: rgba(255, 255, 255, 0.08); 
            --pink-soft: rgba(255, 182, 193, 0.15); 
            --love: #ff4d6d;
        }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { margin: 0; background: #0a0101; color: white; overflow-x: hidden; text-align: center; }
        
        /* الخلفية والنجوم والقلوب */
        .bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.3; animation: twinkle var(--d) infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.7; } }
        
        .bg-heart { position: absolute; color: var(--love); opacity: 0.4; animation: floatUp 7s infinite linear; }
        @keyframes floatUp { from { transform: translateY(110vh) rotate(0deg); } to { transform: translateY(-10vh) rotate(360deg); } }

        /* فيديو الخلفية m7 - مخفي افتراضياً */
        #video-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; opacity: 0.4; display: none; }

        section { min-height: 100vh; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; z-index: 2; }
        .active { display: flex; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .glass-box { background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; padding: 35px 20px; width: 95%; max-width: 420px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        
        /* القلب النابض الشفاف */
        .crystal-heart { font-size: 80px; color: rgba(255, 77, 109, 0.5); filter: drop-shadow(0 0 10px var(--love)); animation: pulse 2s infinite ease-in-out; margin-bottom: 20px; display: inline-block; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.15); opacity: 0.8; } }

        input { width: 90%; padding: 15px; margin: 20px 0; border-radius: 20px; border: 1px solid var(--gold); background: rgba(0,0,0,0.4); color: white; text-align: center; font-size: 18px; outline: none; }
        button { background: linear-gradient(45deg, var(--gold), #f3e5ab); color: #1a0101; border: none; padding: 12px 35px; border-radius: 30px; font-weight: 800; cursor: pointer; transition: 0.3s; margin: 10px 5px; }
        
        .timer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; margin: 20px 0; }
        .time-card { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 22px; border-bottom: 2px solid var(--love); }
        .time-card span { display: block; font-size: 26px; color: var(--gold); font-weight: 800; }

        /* مشغل الموسيقى البيضاوي الخاص بصفحة التاريخ */
        .oval-player { background: rgba(255, 77, 109, 0.2); border: 1px solid var(--love); border-radius: 50px; padding: 10px 25px; display: flex; align-items: center; gap: 15px; margin-top: 20px; box-shadow: 0 5px 15px rgba(255,77,109,0.2); cursor: pointer; }
        .visualizer-bar { width: 3px; height: 15px; background: var(--gold); animation: wave 0.6s infinite alternate; }
        @keyframes wave { from { height: 5px; } to { height: 18px; } }

        .photo-list { width: 100%; max-width: 450px; }
        .photo-item { background: var(--glass); border-radius: 25px; padding: 12px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.05); }
        .photo-item img { width: 100%; border-radius: 20px; }

        #typewriter { line-height: 1.9; font-size: 18px; color: #fff; text-align: justify; }
        .cursor::after { content: '|'; animation: blink 1s infinite; color: var(--gold); }
        @keyframes blink { 50% { opacity: 0; } }

        #backBtn { position: fixed; top: 20px; right: 20px; z-index: 100; background: var(--glass); border: 1px solid var(--gold); color: var(--gold); width: 45px; height: 45px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }
        
        /* أيقونة الموسيقى الصغيرة في باقي الصفحات */
        .music-mini { position: fixed; top: 20px; left: 20px; z-index: 100; background: var(--glass); border: 1px solid var(--gold); width: 45px; height: 45px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }
        .music-mini.muted::after { content: ''; position: absolute; width: 30px; height: 2px; background: #ff4d4d; transform: rotate(-45deg); }

        .falling-item { position: fixed; z-index: 999; pointer-events: none; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(540deg); opacity: 0; } }
    </style>
</head>
<body>

    <div class="bg-container" id="bg"></div>
    <div id="backBtn" onclick="goBack()">➜</div>

    <video id="video-bg" loop muted playsinline><source src="m7.mp4" type="video/mp4"></video>

    <div id="mBtn" class="music-mini" onclick="toggleM()">🎵</div>
    <audio id="audio" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg"></audio>

    <section id="p1" class="active">
        <div class="glass-box">
            <div class="crystal-heart">❤️</div>
            <h2 id="welcome-text" style="color: var(--gold); min-height: 35px; font-weight: 800;" class="cursor"></h2>
            <input type="text" id="pw" placeholder="الباسورد يا دكتورة 😉">
            <button onclick="checkPw()">دخول ❤️</button>
        </div>
    </section>

    <section id="p2">
        <div class="glass-box">
            <h3 style="color: var(--gold); font-weight: 800;">حكايتنا بدأت من..</h3>
            <div class="timer-grid">
                <div class="time-card"><span id="dd">0</span><label>يوم</label></div>
                <div class="time-card"><span id="hh">0</span><label>ساعة</label></div>
                <div class="time-card"><span id="mm">0</span><label>دقيقة</label></div>
                <div class="time-card"><span id="ss">0</span><label>ثانية</label></div>
            </div>
            <div style="background: var(--love); color: #fff; padding: 6px 25px; border-radius: 25px; font-weight: 800; display: inline-block;">14-04-2023</div>
            
            <div class="oval-player" onclick="toggleM()">
                <div class="visualizer-bar" style="animation-delay: 0.1s"></div>
                <div class="visualizer-bar" style="animation-delay: 0.3s"></div>
                <span>مشغل الموسيقى ❤️</span>
                <div class="visualizer-bar" style="animation-delay: 0.2s"></div>
                <div class="visualizer-bar" style="animation-delay: 0.4s"></div>
            </div>

            <button onclick="showPage('p3')" style="margin-top: 25px;">ذكرياتنا 📸</button>
        </div>
    </section>

    <section id="p3" style="justify-content: flex-start; padding-top: 50px;">
        <h2 style="color: var(--gold); font-weight: 800; margin-bottom: 30px;">أجمل لحظاتنا ❤️</h2>
        <div class="photo-list">
            <div class="photo-item"><img src="m1.jpg" onerror="this.src='m1.png'"><p>أول ضحكة صافية ❤️</p></div>
            <div class="photo-item"><img src="m2.jpg" onerror="this.src='m2.png'"><p>البدايات اللي منسيتهاش ❤️</p></div>
            <div class="photo-item"><img src="m3.jpg" onerror="this.src='m3.png'"><p>نور عيني ❤️</p></div>
            <div class="photo-item"><img src="m4.jpg" onerror="this.src='m4.png'"><p>كل تفصيلة معاكي حياة ❤️</p></div>
            <div class="photo-item"><img src="m5.jpg" onerror="this.src='m5.png'"><p>سندي في الدنيا ❤️</p></div>
        </div>
        <button onclick="startFinalPage()">المفاجأة 🎁</button>
    </section>

    <section id="p4">
        <div class="glass-box" style="border: 2px dashed var(--gold); min-height: 250px;">
            <div id="typewriter" class="cursor"></div>
        </div>
        <div class="glass-box" style="margin-top:20px; padding:20px;">
            <h4 style="margin:0; color:var(--gold); font-weight: 800;">باقي على يومنا الكبير إن شاء الله 😉💍</h4>
            <div id="engagement-timer" style="font-size: 20px; margin-top:10px; font-weight:800;"></div>
        </div>
        <button onclick="giveItems()" style="background: var(--love); color: #fff; margin-top: 20px;">خدي وردة 🌸</button>
    </section>

    <script>
        const bg = document.getElementById('bg');
        let currentStep = 1;

        function createElements() {
            // نجوم الخلفية
            for(let i=0; i<45; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                s.style.width = s.style.height = Math.random()*3+'px';
                s.style.left = Math.random()*100+'vw';
                s.style.top = Math.random()*100+'vh';
                s.style.setProperty('--d', (Math.random()*3+2)+'s');
                bg.appendChild(s);
            }
            // تكثيف القلوب قليلاً
            setInterval(() => {
                const h = document.createElement('div');
                h.innerHTML = '💕';
                h.className = 'bg-heart';
                h.style.left = Math.random()*100+'vw';
                h.style.fontSize = (Math.random()*15 + 15)+'px';
                h.style.animationDuration = (Math.random()*3 + 5)+'s';
                bg.appendChild(h);
                setTimeout(() => h.remove(), 7000);
            }, 500); // قلوب أكثر سلاسة
        }
        createElements();

        function typeWriter(id, text, speed, callback) {
            let i = 0; const el = document.getElementById(id); el.innerHTML = "";
            function type() {
                if (i < text.length) { el.innerHTML += text.charAt(i); i++; setTimeout(type, speed); } 
                else if (callback) callback();
            }
            type();
        }

        window.onload = () => {
            // سرعة ظهور نورتي قلبي
            setTimeout(() => { typeWriter("welcome-text", "نورتي قلبي يا دكتورة 😉", 50); }, 300);
        };

        function checkPw() {
            if(document.getElementById('pw').value === 'mab14') {
                showPage('p2');
                const audio = document.getElementById('audio');
                audio.play();
                document.getElementById('mBtn').style.display = 'flex';
                document.getElementById('backBtn').style.display = 'flex';
                setInterval(updateTimers, 1000);
            } else { alert("الباسورد غلط يا دكتورة! 😉"); }
        }

        function showPage(id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            // التحكم في الفيديو: يظهر فقط في p2 (صفحة التاريخ)
            const v = document.getElementById('video-bg');
            if(id === 'p2') { v.style.display = 'block'; v.play(); } 
            else { v.style.display = 'none'; v.pause(); }

            window.scrollTo(0,0);
            if(id === 'p1') currentStep = 1;
            if(id === 'p2') currentStep = 2;
            if(id === 'p3') currentStep = 3;
            if(id === 'p4') currentStep = 4;
        }

        function goBack() {
            if(currentStep === 2) { showPage('p1'); document.getElementById('backBtn').style.display = 'none'; document.getElementById('mBtn').style.display = 'none'; } 
            else if(currentStep === 3) showPage('p2');
            else if(currentStep === 4) showPage('p3');
        }

        function updateTimers() {
            const start = new Date("2023-04-14T00:00:00");
            const now = new Date();
            const diff1 = now - start;
            document.getElementById("dd").innerText = Math.floor(diff1 / 86400000);
            document.getElementById("hh").innerText = Math.floor((diff1 / 3600000) % 24);
            document.getElementById("mm").innerText = Math.floor((diff1 / 60000) % 60);
            document.getElementById("ss").innerText = Math.floor((diff1 / 1000) % 60);

            const target = new Date("2027-10-14T00:00:00");
            const diff2 = target - now;
            if (diff2 > 0) {
                const totalMonths = (target.getFullYear() - now.getFullYear()) * 12 + (target.getMonth() - now.getMonth());
                document.getElementById("engagement-timer").innerText = `${Math.floor(totalMonths/12)} سنة و ${totalMonths%12} شهر`;
            }
        }

        const msg = "يا أغلى من روحي ☺️ أنا قاعد دلوقتي بفكر فيكي ولقيت نفسي عايز أكتبلك كلام كتير رغم إنك عارفة إن الكلام ساعات بيخوني وما بيعرفش يوصف اللي جوايا صح 👀 بس بجد أنا كل يوم بكتشف إن وجودك في حياتي ده أكبر نعمة ربنا رزقني بيها.. أنتي مش بس حبيبتي، أنتي نصيبي الحلو من الدنيا والضحكة اللي بتطلع من قلبي بجد مهما كنت شايل هموم 🫂 عارفة؟ أنا بحب تفاصيلك الصغيرة اللي ممكن محدش ياخد باله منها، بحب طريقتك في الكلام (بس ميمنعش إنك عبيطة 😂)، وبحب إنك دايماً بتعرفي تطمنيني بمجرد كلمة منك.. معاكي بحس إن الدنيا لسه بخير وبحس إن عندي طاقة أهد جبال عشان بس أشوفك مبسوطة ومرتاحة.. أنتي السند والكتف اللي برمي عليه تعبي وببقى عارف إني هقوم أقوى بيكي. نفسي تعرفي إن مفيش حد في الدنيا ممكن ياخد مكانك ولا فيه حاجة تعوضني عنك، أنا عايش عشان اللحظة اللي نكون فيها سوا في بيتنا ونبني كل الأحلام اللي حلمنا بيها مع بعض.. هفضل دايماً جنبك وفي ضهرك ومعاكي في المرة قبل الحلوة عشان أنتي تستاهلي كل حاجة حلوة يا حلوة 😉🌍";

        function startFinalPage() {
            showPage('p4');
            setTimeout(() => { typeWriter("typewriter", msg, 40); }, 500);
        }

        function giveItems() {
            const items = ['🌸','🌹','🌷','🌺','🌻','🌼'];
            for(let i=0; i<25; i++) {
                const f = document.createElement('div');
                f.className = 'falling-item';
                f.innerHTML = items[Math.floor(Math.random()*items.length)];
                f.style.left = Math.random()*100+'vw';
                f.style.top = '-50px';
                f.style.fontSize = (Math.random()*20+20)+'px';
                f.style.animationDuration = (Math.random()*2+2)+'s';
                document.body.appendChild(f);
                setTimeout(() => f.remove(), 4000);
            }
        }

        function toggleM() {
            const a = document.getElementById('audio');
            const btn = document.getElementById('mBtn');
            if (a.paused) { a.play(); btn.classList.remove('muted'); } 
            else { a.pause(); btn.classList.add('muted'); }
        }
    </script>
</body>
</html>
