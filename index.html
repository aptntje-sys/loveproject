<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى ست البنات ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --main: #4a0404; --gold: #c5a059; --glass: rgba(255, 255, 255, 0.1); --light-pink: #ffb6c1; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { margin: 0; background: #0f0101; color: white; overflow-x: hidden; text-align: center; }
        
        .bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.3; animation: twinkle var(--d) infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.8; } }
        
        /* تكثيف القلوب جداً */
        .bg-heart { position: absolute; color: #ffb6c1; opacity: 0.7; animation: floatUp 4s infinite linear; pointer-events: none; }
        @keyframes floatUp { from { transform: translateY(110vh) rotate(0deg); } to { transform: translateY(-10vh) rotate(360deg); } }

        section { min-height: 100vh; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; z-index: 2; }
        .active { display: flex; }

        .glass-box { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; padding: 35px 20px; width: 95%; max-width: 420px; box-shadow: 0 25px 50px rgba(0,0,0,0.7); }
        
        .glass-heart { font-size: 70px; color: rgba(255, 255, 255, 0.2); text-shadow: 0 0 20px rgba(255, 255, 255, 0.4); animation: pulse 1.5s infinite; margin-bottom: 20px; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        input { width: 90%; padding: 15px; margin: 20px 0; border-radius: 20px; border: 1.5px solid var(--gold); background: rgba(0,0,0,0.6); color: white; text-align: center; font-size: 18px; outline: none; }
        button { background: var(--gold); color: #1a0101; border: none; padding: 12px 35px; border-radius: 30px; font-weight: 800; cursor: pointer; transition: 0.3s; margin: 10px 5px; box-shadow: 0 5px 15px rgba(197, 160, 89, 0.3); }
        
        /* مشغل الموسيقى الشيك */
        .music-oval { background: linear-gradient(45deg, rgba(255,255,255,0.1), rgba(197, 160, 89, 0.2)); border: 1.5px solid var(--gold); border-radius: 50px; padding: 10px 30px; margin: 25px 0; display: inline-flex; align-items: center; gap: 20px; cursor: pointer; transition: 0.4s; box-shadow: 0 0 20px rgba(197, 160, 89, 0.2); }
        .music-note { font-size: 24px; animation: spin 3s infinite linear; display: inline-block; color: var(--gold); }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .play-btn { width: 40px; height: 40px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--main); font-size: 18px; box-shadow: 0 0 10px white; }

        .timer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin: 20px 0; }
        .time-card { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 20px; border-bottom: 3px solid var(--gold); }
        .time-card span { display: block; font-size: 24px; color: var(--gold); font-weight: 800; }

        /* فريم الصور الدهبي */
        .photo-list { width: 100%; max-width: 450px; }
        .photo-item { background: var(--glass); border-radius: 25px; padding: 10px; margin-bottom: 35px; border: 2px solid var(--gold); box-shadow: 0 0 20px rgba(197, 160, 89, 0.2); }
        .photo-item img { width: 100%; border-radius: 18px; display: block; }
        .photo-item p { margin-top: 10px; font-weight: 800; color: var(--gold); }

        #typewriter { line-height: 1.9; font-size: 18px; color: #fff; text-align: right; font-weight: bold; }
        .cursor::after { content: '|'; animation: blink 1s infinite; color: var(--gold); }
        @keyframes blink { 50% { opacity: 0; } }

        #backBtn, .music-control { position: fixed; z-index: 100; background: rgba(0,0,0,0.5); border: 1.5px solid var(--gold); color: var(--gold); width: 45px; height: 45px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; backdrop-filter: blur(5px); }
        #backBtn { top: 20px; right: 20px; }
        .music-control { top: 20px; left: 20px; }
        .music-control.muted::after { content: ''; position: absolute; width: 30px; height: 2px; background: #ff4d4d; transform: rotate(-45deg); }

        .falling-flower { position: fixed; font-size: 28px; z-index: 999; pointer-events: none; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

    <div class="bg-container" id="bg"></div>
    <div id="backBtn" onclick="goBack()">➜</div>
    <div id="mBtn" class="music-control" onclick="toggleM()">🎵</div>
    
    <audio id="audio" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg"></audio>

    <section id="p1" class="active">
        <div class="glass-box">
            <div class="glass-heart">🤍</div>
            <h2 id="welcome-text" style="color: var(--gold); min-height: 35px;" class="cursor"></h2>
            <input type="text" id="pw" placeholder="الباسورد يا دكتورة 😉">
            <button onclick="checkPw()">دخول ❤️</button>
        </div>
    </section>

    <section id="p2">
        <div class="glass-box">
            <div class="photo-item" style="margin-bottom: 20px;">
                <img src="m6" onerror="this.src='m6.jpg'; this.onerror=function(){this.src='m6.png';}" alt="m6">
            </div>
            
            <h3 style="color: var(--gold); font-weight: 800;">حكايتنا بدأت من..</h3>
            <div class="timer-grid">
                <div class="time-card"><span id="dd">0</span><label>يوم</label></div>
                <div class="time-card"><span id="hh">0</span><label>ساعة</label></div>
                <div class="time-card"><span id="mm">0</span><label>دقيقة</label></div>
                <div class="time-card"><span id="ss">0</span><label>ثانية</label></div>
            </div>
            
            <div class="music-oval" onclick="toggleM()">
                <span class="music-note" id="noteIcon">🎵</span>
                <span style="font-size: 16px; font-weight: bold; color: #fff;">أغنيتنا</span>
                <div class="play-btn" id="playIcon">▶</div>
            </div>

            <button onclick="showPage('p3')">ذكرياتنا 📸</button>
        </div>
    </section>

    <section id="p3" style="justify-content: flex-start; padding-top: 50px;">
        <h2 style="color: var(--gold); font-weight: 800; margin-bottom: 30px;">أجمل لحظاتنا ❤️</h2>
        <div class="photo-list">
            <div class="photo-item"><img src="m1" onerror="this.src='m1.jpg'; this.onerror=function(){this.src='m1.png';}"><p>أول ضحكة صافية ❤️</p></div>
            <div class="photo-item"><img src="m2" onerror="this.src='m2.jpg'; this.onerror=function(){this.src='m2.png';}"><p>البدايات اللي منسيتهاش ❤️</p></div>
            <div class="photo-item"><img src="m3" onerror="this.src='m3.jpg'; this.onerror=function(){this.src='m3.png';}"><p>نور عيني ❤️</p></div>
            <div class="photo-item"><img src="m4" onerror="this.src='m4.jpg'; this.onerror=function(){this.src='m4.png';}"><p>كل تفصيلة معاكي حياة ❤️</p></div>
            <div class="photo-item"><img src="m5" onerror="this.src='m5.jpg'; this.onerror=function(){this.src='m5.png';}"><p>سندي في الدنيا ❤️</p></div>
        </div>
        <button onclick="startFinalPage()">المفاجأة 🎁</button>
    </section>

    <section id="p4">
        <div class="glass-box" style="border: 2px dashed var(--gold); min-height: 250px;">
            <div id="typewriter" class="cursor"></div>
        </div>
        <div class="glass-box" style="margin-top:20px; padding:20px;">
            <h4 style="margin:0; color:var(--gold); font-weight: 800;">باقي على يومنا الكبير إن شاء الله 😉💍</h4>
            <div id="engagement-timer" style="font-size: 20px; margin-top:10px; font-weight:800;"></div>
        </div>
        <button onclick="giveFlower()" style="background: var(--light-pink); color: #4a0404; margin-top: 20px;">خدي وردة 🌸</button>
    </section>

    <script>
        const bg = document.getElementById('bg');
        let currentStep = 1;

        function createElements() {
            for(let i=0; i<40; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                s.style.width = s.style.height = Math.random()*3+'px';
                s.style.left = Math.random()*100+'vw';
                s.style.top = Math.random()*100+'vh';
                s.style.setProperty('--d', (Math.random()*3+2)+'s');
                bg.appendChild(s);
            }
            setInterval(() => {
                const h = document.createElement('div');
                h.innerHTML = '💕';
                h.className = 'bg-heart';
                h.style.left = Math.random()*100+'vw';
                h.style.fontSize = (Math.random()*25 + 15)+'px'; // قلوب أكبر
                h.style.animationDuration = (Math.random()*2 + 3)+'s'; // أسرع شوية
                bg.appendChild(h);
                setTimeout(() => h.remove(), 5000);
            }, 200); // كثافة عالية جداً
        }
        createElements();

        function typeWriter(id, text, speed, callback) {
            let i = 0; const el = document.getElementById(id); el.innerHTML = "";
            function type() {
                if (i < text.length) { el.innerHTML += text.charAt(i); i++; setTimeout(type, speed); } 
                else if (callback) callback();
            }
            type();
        }

        window.onload = () => {
            setTimeout(() => { typeWriter("welcome-text", "نورتي قلبي يا دكتورة 😉", 40); }, 500);
        };

        function checkPw() {
            if(document.getElementById('pw').value === 'mab14') {
                showPage('p2');
                const audio = document.getElementById('audio');
                audio.play();
                document.getElementById('mBtn').style.display = 'flex';
                document.getElementById('backBtn').style.display = 'flex';
                document.getElementById('playIcon').innerText = '⏸';
                setInterval(updateTimers, 1000);
            } else { alert("الباسورد غلط يا دكتورة! 😉"); }
        }

        function showPage(id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
            currentStep = parseInt(id.replace('p', ''));
        }

        function goBack() {
            if(currentStep === 2) {
                showPage('p1');
                document.getElementById('backBtn').style.display = 'none';
                document.getElementById('mBtn').style.display = 'none';
            } else if(currentStep > 2) {
                showPage('p' + (currentStep - 1));
            }
        }

        function updateTimers() {
            const start = new Date("2023-04-14T00:00:00");
            const now = new Date();
            const diff1 = now - start;
            document.getElementById("dd").innerText = Math.floor(diff1 / 86400000);
            document.getElementById("hh").innerText = Math.floor((diff1 / 3600000) % 24);
            document.getElementById("mm").innerText = Math.floor((diff1 / 60000) % 60);
            document.getElementById("ss").innerText = Math.floor((diff1 / 1000) % 60);

            const target = new Date("2027-10-14T00:00:00");
            const diff2 = target - now;
            if (diff2 > 0) {
                const totalMonths = (target.getFullYear() - now.getFullYear()) * 12 + (target.getMonth() - now.getMonth());
                document.getElementById("engagement-timer").innerText = `${Math.floor(totalMonths/12)} سنة و ${totalMonths%12} شهر`;
            }
        }

        const msg = "يا أغلى من روحي ☺️ أنا قاعد دلوقتي بفكر فيكي ولقيت نفسي عايز أكتبلك كلام كتير رغم إنك عارفة إن الكلام ساعات بيخوني وما بيعرفش يوصف اللي جوايا صح 👀 بس بجد أنا كل يوم بكتشف إن وجودك في حياتي ده أكبر نعمة ربنا رزقني بيها.. أنتي مش بس حبيبتي، أنتي نصيبي الحلو من الدنيا والضحكة اللي بتطلع من قلبي بجد مهما كنت شايل هموم 🫂 معاكي بحس إن الدنيا لسه بخير وبحس إن عندي طاقة أهد جبال عشان بس أشوفك مبسوطة ومرتاحة.. هفضل دايماً جنبك وفي ضهرك ومعاكي في المرة قبل الحلوة عشان أنتي تستاهلي كل حاجة حلوة يا حلوة 😉🌍";

        function startFinalPage() {
            showPage('p4');
            setTimeout(() => { typeWriter("typewriter", msg, 45); }, 500);
        }

        function giveFlower() {
            for(let i=0; i<25; i++) {
                const f = document.createElement('div');
                f.className = 'falling-flower';
                f.innerHTML = ['🌸','🌹','🌷','🌺'][Math.floor(Math.random()*4)];
                f.style.left = Math.random()*100+'vw';
                f.style.top = '-50px';
                f.style.animationDuration = (Math.random()*2+2)+'s';
                document.body.appendChild(f);
                setTimeout(() => f.remove(), 4000);
            }
        }

        function toggleM() {
            const a = document.getElementById('audio');
            const btn = document.getElementById('mBtn');
            const playIcon = document.getElementById('playIcon');
            const noteIcon = document.getElementById('noteIcon');
            if (a.paused) {
                a.play();
                btn.classList.remove('muted');
                playIcon.innerText = '⏸';
                noteIcon.style.animationPlayState = 'running';
            } else {
                a.pause();
                btn.classList.add('muted');
                playIcon.innerText = '▶';
                noteIcon.style.animationPlayState = 'paused';
            }
        }
    </script>
</body>
</html>
