<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💕love MaB💕</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&family=Dancing+Script:wght@700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root { 
            --main: #4a0404; 
            --gold: #c5a059; 
            --glass: rgba(255, 255, 255, 0.1); 
            --light-pink: #ffb6c1; 
            --silver-glass: rgba(192, 192, 192, 0.15); 
            --violet-pink: linear-gradient(135deg, rgba(255, 20, 147, 0.4), rgba(138, 43, 226, 0.4));
            --primary-color: #ff85a2;
        }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { margin: 0; background: #0f0101; color: white; overflow-x: hidden; text-align: center; }
        
        /* تأثيرات الخلفية */
        .bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.3; animation: twinkle var(--d) infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.8; } }
        .bg-heart { position: absolute; color: #ffb6c1; opacity: 0.6; animation: floatUp 6s infinite linear; pointer-events: none; }
        @keyframes floatUp { from { transform: translateY(110vh) rotate(0deg); } to { transform: translateY(-10vh) rotate(360deg); } }

        /* الأزرار والتصاميم */
        .premium-btn {
            background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(192, 192, 192, 0.5);
            backdrop-filter: blur(12px); color: #fff; padding: 12px 30px; border-radius: 40px;
            font-weight: 700; font-size: 15px; cursor: pointer; position: relative;
            overflow: hidden; transition: 0.4s; box-shadow: 0 5px 20px rgba(255,255,255,0.05);
            display: inline-block; margin-top: 15px;
        }
        .premium-btn:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-2px); }

        /* منطقة الشات المدمجة */
        #chat-section {
            width: 100%; max-width: 400px; height: 400px;
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--gold);
            border-radius: 25px; margin: 20px auto; display: flex; flex-direction: column;
            overflow: hidden; backdrop-filter: blur(10px);
        }
        #chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; text-align: right; }
        .message { max-width: 80%; padding: 8px 12px; border-radius: 15px; font-size: 0.9rem; position: relative; animation: fadeIn 0.3s ease; }
        .message.sent { align-self: flex-start; background: var(--primary-color); color: white; border-bottom-right-radius: 2px; }
        .message.received { align-self: flex-end; background: white; color: #333; border-bottom-left-radius: 2px; }
        .chat-input-area { background: rgba(0,0,0,0.3); padding: 10px; display: flex; gap: 5px; }
        .chat-input-area input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid var(--gold); background: #000; color: #fff; margin: 0; font-size: 14px; }
        .chat-input-area button { background: var(--gold); border: none; padding: 0 15px; border-radius: 20px; color: #000; font-weight: bold; cursor: pointer; }

        /* بقية ستايلات الصفحة الأصلية */
        .envelope-capsule { width: 170px; height: 55px; background: var(--violet-pink); border: 1.5px solid rgba(255, 255, 255, 0.5); backdrop-filter: blur(15px); border-radius: 40px; display: flex; align-items: center; justify-content: center; gap: 12px; margin: 0 auto 30px auto; cursor: pointer; box-shadow: 0 0 20px rgba(255, 20, 147, 0.4); animation: smooth-pulse 2.5s infinite ease-in-out; }
        @keyframes smooth-pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        .timer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin: 20px 0; }
        .time-card { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 20px; border-bottom: 3px solid var(--gold); }
        .time-card span { display: block; font-size: 24px; color: var(--gold); font-weight: 800; }

        section { min-height: 100vh; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; z-index: 2; }
        .active { display: flex; }
        .glass-box { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; padding: 35px 20px; width: 95%; max-width: 420px; }
        
        .whatsapp-bubble { background: rgba(255, 255, 255, 0.08); padding: 20px; border-radius: 20px; border-bottom-right-radius: 5px; position: relative; text-align: right; margin-top: 20px; width: 100%; }

        #backBtn, .music-control-fixed { position: fixed; z-index: 100; background: var(--glass); border: 1px solid var(--gold); color: var(--gold); width: 45px; height: 45px; border-radius: 50%; display: none; align-items: center; justify-content: center; cursor: pointer; }
        #backBtn { top: 20px; right: 20px; }
        .music-control-fixed { top: 20px; left: 20px; }
        .kiss-float { position: fixed; bottom: 30px; left: 20px; width: 60px; height: 60px; background: var(--silver-glass); border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 28px; z-index: 9999; cursor: pointer; }
    </style>
</head>
<body>

    <div class="bg-container" id="bg"></div>
    <div id="backBtn" onclick="goBack()">➜</div>
    <div id="mBtnFixed" class="music-control-fixed" onclick="toggleM()">🎵</div>
    <div id="kissBtn" class="kiss-float" onclick="giveKiss()">💋</div>

    <audio id="audio" loop><source src="m.mp3" type="audio/mpeg"></audio>

    <section id="p1" class="active">
        <div class="glass-box">
            <div style="font-size: 50px; margin-bottom: 20px;">💞</div>
            <h2 style="color:var(--gold)">نورتي قلبي يا مزة😉</h2>
            <input type="text" id="pw" placeholder="الباسورد بقا👀" style="width: 80%; padding: 12px; border-radius: 20px; text-align: center; border: 1px solid var(--gold); background: #000; color: #fff;">
            <div class="premium-btn" onclick="checkPw()">خشي برجلك اليمين 😂🤨</div>
        </div>
    </section>

    <section id="p2" style="justify-content: flex-start; padding-top: 80px;">
        <div class="glass-box">
            <h3 style="color: var(--gold);">حكايتنا بدأت من..</h3>
            <div class="timer-grid">
                <div class="time-card"><span id="dd">0</span><label>يوم</label></div>
                <div class="time-card"><span id="hh">0</span><label>ساعة</label></div>
            </div>
            <div style="background: var(--gold); color: #000; padding: 5px 20px; border-radius: 20px; font-weight: 800; display: inline-block; margin: 15px 0;">14-04-2023</div>
            <button class="premium-btn" onclick="showPage('p3')">لحظات عشناها سوا..🫵🏻</button>
        </div>
    </section>

    <section id="p4" style="justify-content: flex-start; padding-top: 50px; padding-bottom: 50px;">
        <div class="glass-box" style="border: 1px solid var(--gold); margin-bottom: 20px;">
            <div id="typewriter" style="line-height: 1.8; text-align: right; font-size: 16px;"></div>
        </div>

        <h3 style="color: var(--gold);">مكاننا السري للمراسلة 🤫</h3>
        <div id="chat-section">
            <div id="chat-container"></div>
            <div class="chat-input-area">
                <input type="text" id="messageInput" placeholder="اكتبي رسالة للحج..">
                <button onclick="sendMessage()">إرسال</button>
            </div>
        </div>

        <div class="whatsapp-bubble">
            <h4 style="margin:0; color:var(--gold); font-size: 14px;">باقي على الفرحة المنتظره ان شاء الله 💍</h4>
            <div id="engagement-timer" style="font-size: 18px; font-weight:800;"></div>
        </div>
    </section>

    <script>
        // --- إعدادات Firebase (نفس إعداداتك بالظبط) ---
        const firebaseConfig = {
            apiKey: "AIzaSyAewNytyPZg-cXpi5hPkJ5ocXXt12-dFRA",
            authDomain: "loveshat.firebaseapp.com",
            databaseURL: "https://loveshat-default-rtdb.firebaseio.com",
            projectId: "loveshat",
            storageBucket: "loveshat.firebasestorage.app",
            messagingSenderId: "82315699615",
            appId: "1:82315699615:web:d20823cb59db705d5149aa"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const userId = Math.random().toString(36).substring(7); 

        // --- وظائف الشات ---
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (text !== "") {
                database.ref('messages').push({ userId: userId, text: text, timestamp: Date.now() });
                input.value = "";
            }
        }

        database.ref('messages').on('child_added', (snapshot) => {
            const data = snapshot.val();
            const chatContainer = document.getElementById('chat-container');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${data.userId === userId ? 'sent' : 'received'}`;
            messageDiv.innerHTML = `${data.text}`;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        });

        // --- وظائف الصفحة الأصلية ---
        function checkPw() {
            if(document.getElementById('pw').value === 'mab17') {
                showPage('p2'); 
                document.getElementById('audio').play();
                document.getElementById('backBtn').style.display = 'flex';
                document.getElementById('mBtnFixed').style.display = 'flex';
                document.getElementById('kissBtn').style.display = 'flex';
                setInterval(updateTimers, 1000);
            } else { alert("الباسورد غلط يا دكتورة! 😉"); }
        }

        function showPage(id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'p4') startTypewriter();
        }

        function updateTimers() {
            const start = new Date("2023-04-14T00:00:00");
            const now = new Date();
            const diff = now - start;
            document.getElementById("dd").innerText = Math.floor(diff / 86400000);
            document.getElementById("hh").innerText = Math.floor((diff / 3600000) % 24);
            
            const target = new Date("2027-10-14T00:00:00");
            const diff2 = target - now;
            if (diff2 > 0) {
                const totalMonths = (target.getFullYear() - now.getFullYear()) * 12 + (target.getMonth() - now.getMonth());
                document.getElementById("engagement-timer").innerText = `${Math.floor(totalMonths/12)} سنة و ${totalMonths%12} اشهر`;
            }
        }

        const msg = "مزتي 👀🫣 أنا قاعد دلوقتي بفكر فيكي... هفضل دايماً جنبك وفي ضهرك ومعاكي في المرة قبل الحلوة عشان أنتي تستاهلي كل حاجة حلوه ي حلوه😉🤷🏻‍♂️🌍";
        function startTypewriter() {
            let i = 0; const el = document.getElementById("typewriter");
            if(el.innerHTML !== "") return;
            function type() { if (i < msg.length) { el.innerHTML += msg.charAt(i); i++; setTimeout(type, 50); } }
            type();
        }

        // إنشاء النجوم والقلوب
        function createBg() {
            for(let i=0; i<30; i++) {
                const s = document.createElement('div'); s.className = 'star';
                s.style.left = Math.random()*100+'vw'; s.style.top = Math.random()*100+'vh';
                s.style.setProperty('--d', (Math.random()*3+2)+'s');
                document.getElementById('bg').appendChild(s);
            }
        }
        createBg();

        function toggleM() {
            const a = document.getElementById('audio');
            a.paused ? a.play() : a.pause();
        }
        
        function goBack() { showPage('p1'); }

        function giveKiss() {
            const k = document.createElement('div'); k.innerHTML = '💋';
            k.style.position = 'fixed'; k.style.left = '50%'; k.style.bottom = '20px';
            k.style.fontSize = '40px'; k.style.zIndex = '10000'; k.style.transition = '2s';
            document.body.appendChild(k);
            setTimeout(() => { k.style.transform = 'translateY(-100vh)'; k.style.opacity = '0'; }, 50);
        }
    </script>
</body>
</html>
